name: Terraform Apply

on:
  push:
    branches:
      - main   # Fires on squash merges (pushes to main)
  workflow_dispatch: 

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  apply:
    if: github.event.pull_request.merged == true   # Run only if the PR was merged (not just closed)
    runs-on: ubuntu-latest
    environment:
      name: deploy   # Configure reviewers in Settings → Environments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5   # Pin version for consistency

      - name: Initialize Terraform
        run: terraform init

      - name: Apply Terraform
        run: terraform apply -auto-approve