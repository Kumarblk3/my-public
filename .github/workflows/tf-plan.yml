name: Terraform Plan

on:
  pull_request:
    branches:
      - '**'   # run plan on all branches
    types: [opened, synchronize, reopened]

permissions:        # permissions block
  contents: read
  pull-requests: write
  issues: write

permissions:        # permissions block
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false -out=plan.out

      - name: Extract Plan Summary
        id: summary
        run: |
          echo "PLAN_SUMMARY=$(terraform show -no-color plan.out | grep 'Plan:')" >> $GITHUB_ENV

      - name: Comment Plan Summary on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Terraform Plan Summary
            ```
            ${{ env.PLAN_SUMMARY }}
            ```