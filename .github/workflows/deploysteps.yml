name: Deploy to AWS

on:
  push:
    branches:
      - '**'  # runs when you push to main branch
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # updated to latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5   # updated to latest
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3   # updated to latest

      - name: Initialize Terraform
        run: terraform init

      - name: Plan Terraform
        run: terraform plan

      - name: Apply Terraform
        if: github.ref == 'refs/heads/main'   # only apply on main branch
        run: terraform apply -auto-approve
